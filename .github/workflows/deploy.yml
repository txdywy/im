name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject cache-bust version hashes
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "Version: $SHA"
          # Append ?v=SHA to all local asset references in HTML
          sed -i "s|href=\"css/style.css\"|href=\"css/style.css?v=${SHA}\"|g" index.html
          sed -i "s|src=\"js/crypto.js\"|src=\"js/crypto.js?v=${SHA}\"|g" index.html
          sed -i "s|src=\"js/fileCache.js\"|src=\"js/fileCache.js?v=${SHA}\"|g" index.html
          sed -i "s|src=\"js/p2p.js\"|src=\"js/p2p.js?v=${SHA}\"|g" index.html
          sed -i "s|src=\"js/app.js\"|src=\"js/app.js?v=${SHA}\"|g" index.html
          # Generate version.json for runtime checks
          echo "{\"sha\":\"${SHA}\",\"ts\":$(date +%s)}" > version.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
