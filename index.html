<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>IM - P2P Encrypted Chat</title>
  <script>
    // Cache busting: synchronous fetch of version.json (same-origin, ~50ms)
    // Appends ?v=SHA to ALL script/CSS URLs to force CDN cache refresh on deploy
    (function() {
      var v = '';
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'version.json', false); // synchronous
        xhr.send();
        if (xhr.status === 200) {
          var j = JSON.parse(xhr.responseText);
          v = j.sha || j.ts || '';
        }
      } catch(e) {}
      window.__v = v;
      var q = v ? '?v=' + v : '';

      document.write('<link rel="stylesheet" href="css/style.css' + q + '">');

      // Viewport fix (inline)
      document.write('<script>(' + function() {
        function setVH() {
          var vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', vh + 'px');
        }
        setVH();
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', setVH);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setVH);
        }
      } + ')()<\/script>');
    })();
  </script>
</head>
<body>
  <!-- Join Screen -->
  <div id="joinScreen" class="screen">
    <div class="join-card">
      <h1>IM</h1>
      <p class="subtitle">End-to-end encrypted P2P chat</p>

      <div class="form-group">
        <label for="nicknameInput">Nickname</label>
        <input type="text" id="nicknameInput" placeholder="Your name" maxlength="32" value="">
      </div>

      <div class="form-group">
        <label for="tokenInput">Room Token</label>
        <div class="token-row">
          <input type="text" id="tokenInput" placeholder="Enter or generate a token" maxlength="64" autocomplete="off">
          <button id="generateBtn" class="btn-secondary" title="Generate random token">&#x21bb;</button>
        </div>
      </div>

      <div id="qrSection" class="qr-section" style="display:none">
        <canvas id="qrCanvas"></canvas>
        <p class="qr-hint">Scan to join this room</p>
        <button id="copyLinkBtn" class="btn-link">Copy Link</button>
      </div>

      <div id="joinStatus" class="status"></div>

      <button id="joinBtn" class="btn-primary">Join Room</button>

      <div class="info-box">
        <p>All messages and files are encrypted end-to-end. Only people with the room token can decrypt the content. Nothing passes through any server.</p>
      </div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen" class="screen hidden">
    <header class="chat-header">
      <div class="header-left">
        <span class="room-label">Room:</span>
        <span id="roomToken" class="room-token"></span>
        <button id="sharePanelBtn" class="btn-icon share-panel-btn" title="Share room">&#x2699;</button>
      </div>
      <div class="header-right">
        <span id="connectionStatus" class="conn-status"></span>
        <span class="key-verification" title="Key fingerprint for verification">
          Key: <code id="keyFingerprint">...</code>
        </span>
        <span id="peerCount" class="peer-count">0 peers</span>
        <button id="pingBtn" class="btn-icon ping-btn" title="Test connectivity">Ping</button>
        <button id="leaveBtn" class="btn-icon btn-danger" title="Leave room">Leave</button>
      </div>
    </header>

    <!-- Share Panel (hidden by default, toggled by sharePanelBtn) -->
    <div id="sharePanel" class="share-panel hidden">
      <div class="share-panel-inner">
        <div class="share-section">
          <label>Room Token</label>
          <div class="share-row">
            <code id="shareToken" class="share-value"></code>
            <button id="shareCopyToken" class="btn-accent">Copy</button>
          </div>
        </div>
        <div class="share-section">
          <label>Room Link</label>
          <div class="share-row">
            <code id="shareLink" class="share-value share-link-value"></code>
            <button id="shareCopyLink" class="btn-accent">Copy</button>
          </div>
        </div>
        <div class="share-section share-qr-section">
          <canvas id="shareQrCanvas"></canvas>
        </div>
        <button id="shareNativeBtn" class="btn-primary share-native-btn hidden">Share via...</button>
      </div>
    </div>

    <div id="messages" class="messages"></div>

    <!-- Ping overlay -->
    <div id="pingOverlay" class="ping-overlay hidden">
      <div class="ping-vis">
        <div class="pv-node pv-you">
          <div class="pv-node-dot"></div>
          <div class="pv-node-label">You</div>
        </div>
        <div class="pv-track">
          <div class="pv-dot pv-dot-out" id="pingDotOut"></div>
          <div class="pv-dot pv-dot-back" id="pingDotBack"></div>
          <div class="pv-line"></div>
        </div>
        <div class="pv-node pv-peer">
          <div class="pv-node-dot"></div>
          <div class="pv-node-label">Peer</div>
        </div>
      </div>
      <div class="pv-result" id="pingResult">
        <div class="pv-result-icon" id="pingResultIcon"></div>
        <div class="pv-result-text" id="pingResultText"></div>
      </div>
    </div>

    <div id="dropZone" class="drop-zone">
      <div class="drop-zone-content">
        <div class="input-row">
          <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
          <label class="btn-icon file-btn" title="Send file">
            <span class="file-btn-icon">+</span>
            <input type="file" id="fileInput" multiple hidden>
          </label>
          <button id="sendBtn" class="btn-primary btn-send">Send</button>
        </div>
        <p class="drop-hint">Drop files here to send</p>
      </div>
    </div>
  </div>

  <!-- Scripts: loaded with cache-bust version from build -->
  <script>
    (function() {
      var q = window.__v ? '?v=' + window.__v : '';
      var scripts = [
        'https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js',
        'https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js',
        'js/crypto.js' + q,
        'js/fileCache.js' + q,
        'js/p2p.js' + q,
        'js/app.js' + q
      ];
      function loadNext(i) {
        if (i >= scripts.length) return;
        var s = document.createElement('script');
        s.src = scripts[i];
        if (scripts[i].indexOf('peerjs') !== -1) {
          s.onerror = function() { window._peerjsFailed = true; loadNext(i + 1); };
        } else {
          s.onerror = function() { loadNext(i + 1); };
        }
        s.onload = function() { loadNext(i + 1); };
        document.body.appendChild(s);
      }
      loadNext(0);
    })();
  </script>
</body>
</html>
